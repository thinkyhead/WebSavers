<!DOCTYPE html>
<!-- Authored with gpt-oss-20b running as a helpful AI assistant -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cyberpunk Spheres</title>
  <style>body{margin:0; overflow:hidden; background:#000}</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, spheres, stars;
const sphereCount = 200;   // tweak for performance
const starCount  = 3000;

init();
animate();

function init() {
  // ----- Scene & Camera ----------------------------------------------------
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0,0,50);              // start away from the field
  scene.add(camera);

  // ----- Renderer ----------------------------------------------------------
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;   // HDR look
  document.body.appendChild(renderer.domElement);

  // ----- Lights ------------------------------------------------------------
  const ambient = new THREE.AmbientLight(0x222222); // faint global glow
  scene.add(ambient);

  // ----- Spheres -----------------------------------------------------------
  const geo = new THREE.SphereGeometry(1.5, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    metalness: 0.3,
    roughness: 0.4,
    color: 0xFFFFFF,
    emissive: 0x000000,
    emissiveIntensity: 1,
    flatShading: false,
    blending: THREE.AdditiveBlending,
    transparent: true
  });

  spheres = new THREE.Group();
  for (let i = 0; i < sphereCount; i++) {
    const m = new THREE.Mesh(geo, mat.clone());
    // Random position inside a cube of side 50
    m.position.set(
      THREE.MathUtils.randFloatSpread(50),
      THREE.MathUtils.randFloatSpread(50),
      THREE.MathUtils.randFloatSpread(50)
    );
    // Random initial scale for later pulsation
    const s = THREE.MathUtils.randFloat(0.8, 1.5);
    m.scale.set(s,s,s);
    // Store original scale for pulsing
    m.userData.baseScale = s;
    spheres.add(m);
  }
  scene.add(spheres);

  // ----- Stars (point cloud) -----------------------------------------------
  const starGeo = new THREE.BufferGeometry();
  const starPositions = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    starPositions[i*3]   = THREE.MathUtils.randFloatSpread(200);
    starPositions[i*3+1] = THREE.MathUtils.randFloatSpread(200);
    starPositions[i*3+2] = THREE.MathUtils.randFloatSpread(200);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions,3));
  const starMat = new THREE.PointsMaterial({
    color: 0xeeeeee,
    size: 0.4,
    sizeAttenuation: true,
    transparent:true,
    opacity:0.8
  });
  stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  // ----- Resize ------------------------------------------------------------
  window.addEventListener('resize', onResize, false);
}

function onResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ----- Animation Loop ------------------------------------------------------
function animate() {
  requestAnimationFrame(animate);
  const t = performance.now() * 0.001;   // time in seconds

  // 1. Move camera slowly in a circle around origin
  const radius = 50;
  camera.position.x = Math.cos(t*0.05) * radius;
  camera.position.z = Math.sin(t*0.05) * radius;
  camera.lookAt(0,0,0);

  // 2. Swirling motion: each sphere gets a small rotation around a random axis
  spheres.children.forEach((mesh,i)=>{
    const axis = new THREE.Vector3(
      Math.sin(i+t*0.1),
      Math.cos(i+t*0.2),
      Math.sin(i*0.3)
    ).normalize();
    mesh.rotateOnAxis(axis, 0.01);

    // 3. Pulsating scale: simple sine wave
    const pulse = 0.2 * Math.sin(t*2 + i);
    const s = mesh.userData.baseScale + pulse;
    mesh.scale.set(s,s,s);

    // 4. Colour pulsing: switch between electric blue, neon pink, emerald green
    const hue = 0.6 + 0.4 * Math.sin(t*0.5 + i);
    const saturation = 0.8;
    const value = 0.8 + 0.2 * Math.sin(t*0.3 + i);
    const colour = new THREE.Color().setHSL(hue, saturation, value);
    mesh.material.color.copy(colour);
    mesh.material.emissive.copy(colour);
  });

  // 5. Optional: subtle star twinkling
  stars.material.opacity = 0.8 + 0.1 * Math.sin(t*0.3);

  renderer.render(scene, camera);
}
</script>
</body>
</html>
